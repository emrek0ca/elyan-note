name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Tauri icon asset
        shell: bash
        run: |
          mkdir -p src-tauri/icons
          node -e "const fs=require('fs'); const icon='iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO7+H9cAAAAASUVORK5CYII='; fs.writeFileSync('src-tauri/icons/icon.png', Buffer.from(icon, 'base64'));"

      - name: Compute release tag
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "name=Elyan Note v0.1.0" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=Elyan Note ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Tauri prerequisites
        uses: tauri-apps/setup-tauri-action@v0

      - name: Build and attach release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ${{ steps.meta.outputs.name }}
          releaseBody: |
            Automated release of Elyan Note.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
